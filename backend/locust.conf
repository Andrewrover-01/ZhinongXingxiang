# locust.conf — 《智农兴乡》默认压测配置
# 文档: https://docs.locust.io/en/stable/configuration.html
#
# 对应验收标准 (PLAN.md §4.4):
#   · 100 并发用户
#   · P95 响应时间 ≤ 5 秒
#   · 错误率 ≤ 1%
#
# 无头运行 (CI/CD):
#   locust -f locustfile.py --headless
#
# Web UI 运行 (本地调试):
#   locust -f locustfile.py
#   然后访问 http://localhost:8089

locustfile = locustfile.py
host = http://localhost:8000

# 并发用户数（目标 100 并发）
users = 100

# 每秒孵化速率 — 10 s 内达到 100 并发
spawn-rate = 10

# 压测持续时间（2 分钟稳定负载）
run-time = 120s

# 以下选项仅在 --headless 模式下生效
# headless = true

# CSV 报告输出路径（CI 采集结果用）
csv = load_test_results

# 详细日志级别
loglevel = INFO
