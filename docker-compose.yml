services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhinong
      POSTGRES_PASSWORD: zhinong_secret
      POSTGRES_DB: zhinong
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhinong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://zhinong:zhinong_secret@db:5432/zhinong
      REDIS_URL: redis://redis:6379/0
      QWEN_API_KEY: ${QWEN_API_KEY}
      SECRET_KEY: "zn123"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      UPLOAD_DIR: /app/uploads
      # 注意：CORS 允许前端 3001 端口访问
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_data
      - onnx_cache:/root/.cache/chroma
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 这里的地址非常关键，必须是外部能访问到的后端地址
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  chroma_data:
  onnx_cache: